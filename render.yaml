services:
  - type: web
    name: sfg-suwerwa-site
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SEED_USERNAME
        value: admin
      - key: ADMIN_SEED_PASSWORD
        sync: false
